{% extends "_layout.html" %}


{%- block title -%}
<title>Login</title>
{%- endblock -%}

{%- block content -%}
  <h1>Login</h1>
  <p>
    Please enter your username and password to log in.
  </p>
  <p>
    If you do not have an account, please contact the administrator.
  </p>

<html>
  <head>
    <title>Login</title>
    <style>
      label {
        display: block;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>
    <ul>
      <li>
      </li>
    </ul>

    <form method="post">
      <fieldset>
        <legend>User login</legend>
        <p>
          <label for="username">Username</label>
          <input name="username" id="username" value="ferris" />
        </p>
        <p>
          <label for="password">Password</label>
          <input
            name="password"
            id="password"
            type="password"
            value="hunter42"
          />
        </p>
      </fieldset>

      <input type="submit" value="login" />

      {% if let Some(next) = next %}
      <input type="hidden" name="next" value="{{next}}" />
      {% endif %}
    </form>
  </body>
</html>

{%- endblock -%}
