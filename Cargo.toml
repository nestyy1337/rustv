[package]
name = "backend"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[[bin]]
name = "rustv-backend"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.98"
axum = "0.8.4"
config = "0.15.13"
dotenv = "0.15.0"
serde = "1.0.219"
serde-aux = "4.7.0"
sqlx = "0.8.6"
thiserror = "2.0.12"
tokio = { version = "1.47.1", features = ["rt", "macros", "rt-multi-thread"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"


